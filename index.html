<!DOCTYPE html>
<html>
<head>
    <title>Mon Cloud de Cours</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>📚 Mes Matières</h2>
    <div class="card">
        <form action="/create_folder" method="post">
            <input type="text" name="folder_name" placeholder="Nom du dossier (ex: Maths)" required>
            <button type="submit">Créer</button>
        </form>
    </div>
    {% for folder in folders %}
    <div class="card">
        <a href="/folder/{{ folder }}" style="text-decoration: none; color: #333; font-weight: bold;">📁 {{ folder }}</a>
    </div>
    {% endfor %}
</body>
</html>
